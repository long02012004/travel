<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | AI Travel Planner</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="auth.css">
    <style>
        /* Registration specific tweaks if needed */
        .auth-form {
            gap: 16px;
            /* slightly tighter gap for more fields */
        }

        .btn-submit {
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <!-- Animated Background Blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

   

    <!-- Main Content -->
    <main class="auth-main">
        <div class="auth-container">
            <!-- Left Side / Illustration base exactly same as login for consistency -->
            <div class="auth-left">
                <div class="left-content">
                    <h1 class="gradient-text-auth">Bắt đầu hành trình <br>tuyệt vời.</h1>
                    <p>Tạo tài khoản miễn phí để mở khóa toàn bộ tính năng và bắt đầu việc lên kế hoạch thông minh dễ
                        dàng hơn bao giờ hết.</p>
                </div>
                <div class="illustration">
                    <!-- Standard dummy image referencing the photo in mockup -->
                    <div class="image-box">
                        <img src="images/auth_illustration.png" alt="Travel Illustration">
                    </div>
                </div>
            </div>

            <!-- Right Side / Register Card -->
            <div class="auth-right">
                <div class="form-header">
                    <h2 class="gradient-text-auth">Tạo tài khoản mới</h2>
                    <p>Điền thông tin của bạn để gia nhập cộng đồng</p>
                </div>

                <!-- Setup form -->
                <form id="registerForm" class="auth-form">

                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="fullname">Họ và tên</label>
                        <div class="input-container">
                            <i class="ph-duotone ph-user input-icon"></i>
                            <input type="text" id="fullname" placeholder="Nguyễn Văn A" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email của bạn</label>
                        <div class="input-container">
                            <i class="ph-duotone ph-envelope-simple input-icon"></i>
                            <input type="email" id="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="input-container">
                            <i class="ph-duotone ph-lock-key input-icon"></i>
                            <input type="password" id="password" placeholder="Tạo mật khẩu (ít nhất 8 ký tự)" required>
                            <i class="ph-duotone ph-eye eye-icon"></i>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="confirm-password">Xác nhận mật khẩu</label>
                        <div class="input-container">
                            <i class="ph-duotone ph-lock-key input-icon"></i>
                            <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
                            <i class="ph-duotone ph-eye eye-icon"></i>
                        </div>
                    </div>

                    <!-- Policy Check -->
                    <div class="checkbox-group" style="margin-top: 8px;">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">Tôi đồng ý với <a href="#" style="color:var(--auth-primary);">Điều khoản</a>
                            và <a href="#" style="color:var(--auth-primary);">Chính sách bảo mật</a></label>
                    </div>

                    <button type="submit" class="btn-submit">Đăng ký hoàn tất</button>

                    <div class="divider">Hoặc dễ dàng với</div>

                    <!-- Social Login -->
                    <div class="social-buttons" style="margin-bottom: 0;">
                        <button type="button" class="btn-social btn-google">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                            Google
                        </button>
                        <button type="button" class="btn-social btn-facebook">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                            Facebook
                        </button>
                    </div>
                </form>

                <div class="auth-footer-text">
                    Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </div>
            </div>
        </div>
    </main>


    <script src="auth.js"></script>
</body>

</html>
