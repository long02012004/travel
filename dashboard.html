<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý lịch trình | AI Travel Planner</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="app.css">
</head>

<body class="dashboard-layout">

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="dashboard.html" class="brand">
                <div class="brand-icon">
                    <i class="ph-bold ph-sparkle"></i>
                </div>
                <div class="brand-text">
                    <span class="brand-name">AI Travel Planner</span>
                    <span class="brand-sub">Hệ thống quản lý</span>
                </div>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="ph-fill ph-house"></i>
                    <span>Trang chủ</span>
                </a>
                <a href="dashboard.html" class="nav-item active">
                    <i class="ph-fill ph-squares-four"></i>
                    <span>Bảng điều khiển</span>
                </a>
                <a href="explore.html" class="nav-item">
                    <i class="ph-fill ph-compass"></i>
                    <span>Khám phá</span>
                </a>
                <a href="destination.html" class="nav-item">
                    <i class="ph-fill ph-bookmark-simple"></i>
                    <span>Địa điểm</span>
                </a>
                <a href="review.html" class="nav-item">
                    <i class="ph-fill ph-star"></i>
                    <span>Đánh giá</span>
                </a>
                
                <div class="nav-section-title">HỆ THỐNG</div>
                <a href="#" class="nav-item">
                    <i class="ph-fill ph-gear"></i>
                    <span>Cài đặt</span>
                </a>
                <a href="index.html" class="nav-item btn-logout" id="logoutBtn" style="color: #ef4444; margin-top: auto;">
                    <i class="ph-bold ph-sign-out"></i>
                    <span>Đăng xuất</span>
                </a>
            </nav>

            <div class="user-profile">
                <!-- Image source matching the mockup's style roughly -->
                <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=80"
                    alt="Avatar" class="user-avatar">
                <div class="user-info">
                    <span class="user-name">Nguyễn Minh</span>
                    <span class="user-email">nguyenminh@travel.vn</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Topbar -->
            <header class="topbar">
                <div class="search-container">
                    <i class="ph-bold ph-magnifying-glass search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm lịch trình...">
                </div>

                <div class="topbar-actions">
                    <button class="theme-toggle-btn" id="themeToggle" title="Chuyển chế độ tối/sáng">
                        <i class="ph-bold ph-moon"></i>
                    </button>
                    <button class="notification-btn">
                        <i class="ph-fill ph-bell"></i>
                        <span class="notification-dot"></span>
                    </button>
                    <a href="planner.html" class="btn-primary">
                        <i class="ph-bold ph-plus"></i>
                        Tạo lịch trình mới
                    </a>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">

                <div class="dashboard-header">
                    <div class="dashboard-title">
                        <h1>Quản lý lịch trình</h1>
                        <p>Tổ chức và theo dõi các kế hoạch du lịch của bạn một cách chuyên nghiệp.</p>
                    </div>

                    <div class="trip-filters">
                        <button class="filter-btn active">Tất cả</button>
                        <button class="filter-btn">Sắp tới</button>
                        <button class="filter-btn">Đã xong</button>
                    </div>
                </div>

                <div class="trip-grid" id="tripGrid">
                    <!-- Dynamic Trips will be populated by dashboard.js here -->
                </div>

            </div>
        </main>

    </div>

    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
