<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | AI Travel Planner</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <!-- Animated Background Blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>



    <!-- Main Content -->
    <main class="auth-main">
        <div class="auth-container">
            <!-- Left Side / Illustration -->
            <div class="auth-left">
                <div class="left-content">
                    <h1 class="gradient-text-auth">Khám phá thế giới <br>theo cách của bạn.</h1>
                    <p>Đăng nhập để tiếp tục hành trình lên kế hoạch cho chuyến đi mơ ước với sự trợ giúp từ AI.</p>
                </div>
                <div class="illustration">
                    <!-- Standard dummy image referencing the photo in mockup -->
                    <div class="image-box">
                        <img src="images/auth_illustration.png" alt="Travel Illustration">
                    </div>
                </div>
            </div>

            <!-- Right Side / Login Card -->
            <div class="auth-right">
                <div class="form-header">
                    <h2 class="gradient-text-auth">Chào mừng trở lại</h2>
                    <p>Vui lòng nhập thông tin để truy cập tài khoản</p>
                </div>

                <!-- Social Login -->
                <div class="social-buttons">
                    <button class="btn-social btn-google">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                        Google
                    </button>
                    <button class="btn-social btn-facebook">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                        Facebook
                    </button>
                </div>

                <div class="divider">Hoặc tiếp tục với email</div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email của bạn</label>
                        <div class="input-container">
                            <i class="ph-duotone ph-envelope-simple input-icon"></i>
                            <input type="email" id="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <div class="form-label-row">
                            <label for="password">Mật khẩu</label>
                            <a href="#" class="forgot-link">Quên mật khẩu?</a>
                        </div>
                        <div class="input-container">
                            <i class="ph-duotone ph-lock-key input-icon"></i>
                            <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                            <i class="ph-duotone ph-eye eye-icon"></i>
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember">Ghi nhớ đăng nhập</label>
                    </div>

                    <button type="submit" class="btn-submit" style="color: aliceblue;">Đăng nhập</button>
                </form>

                <div class="auth-footer-text">
                    Bạn chưa có tài khoản? <a href="register.html" >Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </main>

    

    <script src="auth.js"></script>
</body>

</html>
